name: SSHX Next Level Runner

on:
  workflow_dispatch:

jobs:
  sshx-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours

    steps:
      - name: 🧠 Initialize logger
        run: |
          LOG=runtime.log
          echo "LOG_FILE=$LOG" >> $GITHUB_ENV
          echo "===============================" > $LOG
          echo "🚀 VM BOOTED AT: $(date)" >> $LOG
          echo "===============================" >> $LOG

      - name: 🏷️ Set hostname
        run: |
          sudo hostnamectl set-hostname ash
          echo "[INFO] Hostname set to ash at $(date)" | tee -a $LOG_FILE

      - name: 🔄 System update & tools install
        run: |
          echo "[INFO] Running apt update..." | tee -a $LOG_FILE
          sudo apt update -y >> $LOG_FILE 2>&1
          echo "[INFO] Installing neofetch + curl..." | tee -a $LOG_FILE
          sudo apt install -y neofetch curl >> $LOG_FILE 2>&1

      - name: 🖥️ System info
        run: |
          neofetch | tee -a $LOG_FILE

      - name: 🌐 Start SSHX session
        run: |
          echo "[INFO] Installing SSHX..." | tee -a $LOG_FILE
          curl -s https://sshx.io/get | bash >> $LOG_FILE 2>&1

          echo "[INFO] Launching SSHX..." | tee -a $LOG_FILE
          sshx --shell bash | tee sshx.log &
          sleep 15

          SSHX_URL=$(grep -o 'https://sshx.io/[^ ]*' sshx.log | head -n 1)
          echo "SSHX_URL=$SSHX_URL" >> $GITHUB_ENV

          echo "[SUCCESS] SSHX URL: $SSHX_URL" | tee -a $LOG_FILE

          curl -s -X POST "https://api.telegram.org/bot8362379114:AAFg_bOXNSu5uiLagudbPGS4Hshjg53NAmM/sendMessage" \
            -d chat_id=7269251740 \
            -d parse_mode=Markdown \
            -d text="🚀 *Fresh GitHub VM Online!*
🖥️ Host: \`ash\`
🐧 Ubuntu Runner
🛠️ neofetch installed
🌐 *SSHX URL:*
$SSHX_URL

⏳ Max runtime: 6 hours
📜 Full logging enabled
😄 Treat this VM gently… it has a short life."

      - name: ⏱️ Hourly runtime monitor
        run: |
          for HOUR in 1 2 3 4 5 6; do
            sleep 3600
            NOW=$(date)

            echo "[HEARTBEAT] Hour $HOUR reached at $NOW" | tee -a $LOG_FILE

            curl -s -X POST "https://api.telegram.org/bot8362379114:AAFg_bOXNSu5uiLagudbPGS4Hshjg53NAmM/sendMessage" \
              -d chat_id=7269251740 \
              -d text="⏱️ *Runtime Update*
Hour: $HOUR / 6
🕒 Time: $NOW
🖥️ Status: VM still alive ✅
😎 Runner is chilling…"
          done

      - name: 🔄 Shutdown & handoff notice
        run: |
          echo "[INFO] VM reaching end of life at $(date)" | tee -a $LOG_FILE

          curl -s -X POST "https://api.telegram.org/bot8362379114:AAFg_bOXNSu5uiLagudbPGS4Hshjg53NAmM/sendMessage" \
            -d chat_id=7269251740 \
            -d parse_mode=Markdown \
            -d text="💀 *VM Lifecycle Complete*
⏳ 6 hours reached
📜 Logs captured
🧠 This runner is now dying peacefully…

🔁 *Next job = fresh VM*
🌐 New SSHX URL coming soon
♻️ GitHub runners are immortal 😈"

          echo "===============================" >> $LOG_FILE
          echo "🛑 VM SHUTDOWN AT: $(date)" >> $LOG_FILE
          echo "===============================" >> $LOG_FILE

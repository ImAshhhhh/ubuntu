name: SSHX Runner

on:
  workflow_dispatch:

jobs:
  sshx-vm:
    runs-on: ubuntu-slim
    timeout-minutes: 360

    steps:
      - name: Init logger
        run: |
          LOG=runtime.log
          echo "LOG_FILE=$LOG" >> $GITHUB_ENV
          echo "VM BOOTED AT: $(date)" > $LOG

      - name: Set hostname
        run: |
          sudo hostnamectl set-hostname ash
          echo "Hostname set" >> $LOG_FILE

      - name: Install tools
        run: |
          sudo apt update -y >> $LOG_FILE 2>&1
          sudo apt install -y neofetch curl >> $LOG_FILE 2>&1

      - name: System info
        run: |
          neofetch | tee -a $LOG_FILE

      - name: Start SSHX
        run: |
          curl -s https://sshx.io/get | bash
          sshx --shell bash | tee sshx.log &
          sleep 15
          SSHX_URL=$(grep -o 'https://sshx.io/[^ ]*' sshx.log | head -n 1)
          curl -s -X POST "https://api.telegram.org/bot8362379114:AAFg_bOXNSu5uiLagudbPGS4Hshjg53NAmM/sendMessage" \
            -d chat_id=7269251740 \
            --data-urlencode text="Fresh VM started. SSHX URL: $SSHX_URL"

      - name: Hourly heartbeat
        run: |
          for H in 1 2 3 4 5 6; do
            sleep 3600
            curl -s -X POST "https://api.telegram.org/bot8362379114:AAFg_bOXNSu5uiLagudbPGS4Hshjg53NAmM/sendMessage" \
              -d chat_id=7269251740 \
              --data-urlencode text="Hour $H of 6 completed"
          done

      - name: Shutdown notice
        run: |
          curl -s -X POST "https://api.telegram.org/bot8362379114:AAFg_bOXNSu5uiLagudbPGS4Hshjg53NAmM/sendMessage" \
            -d chat_id=7269251740 \
            --data-urlencode text="VM finished. Switching to new runner."

name: SSHX Auto Chain

on:
  workflow_run:
    workflows:
      - SSHX Runner
    types:
      - completed

permissions:
  actions: write
  contents: read

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart SSHX Runner
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/sshx-run.yml/dispatches \
            -d '{"ref":"main"}'
